services:
  pg16:
    image: postgres:16
    container_name: pg16-temp
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - ../../db/initdb/01_create_schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -U postgres -d appdb"]
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 5s

  openapi-gen:
      container_name: openapi-gen-temp
      build:
        context: ./
      depends_on:
        pg16:
          condition: service_healthy
      working_dir: /work
      volumes:
        # 把输出写回宿主机（例如写到仓库根 openapi.yaml）
        - ./:/work
      command:
        [
          "python", "/app/gen_openapi_pg16.py",
          "--dsn", "postgresql://postgres:postgres@pg16:5432/appdb",
          "--schemas", "public",
          "--base-path", "/v1",
          "--title", "AI Kids Care API",
          "--version", "2.0.4",
          "--server-url", "http://localhost:8080/api",
          "--out", "/work/openapi.yaml",
          "--update-exclude-suffixes", "created_at,created_by",
          "--create-exclude-suffixes", "created_at,updated_at"
        ]
      restart: "no"