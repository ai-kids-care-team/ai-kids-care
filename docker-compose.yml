services:
  db:
    image: postgres:16
    container_name: ai-kids-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kids_postgres_db}
      POSTGRES_USER: ${POSTGRES_USER:-kids_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kids_pass}
      TZ: Asia/Seoul
      PGTZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kids_user} -d ${POSTGRES_DB:-kids_postgres_db}" ]
      interval: 5s
      timeout: 5s
      retries: 5


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: on-failure
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-kids_postgres_db}
      DB_USER: ${POSTGRES_USER:-kids_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-kids_pass}
      JWT_SECRET: mySecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong
      TZ: Asia/Seoul
      JAVA_TOOL_OPTIONS: -Duser.timezone=Asia/Seoul
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    environment:
      TZ: Asia/Seoul
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: