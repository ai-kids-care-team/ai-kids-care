services:
  ai-inference:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-kids-inference
    restart: unless-stopped
    environment:
      AI_MODEL_DIR: /app/outputs/videomae_baseline/best_model
      AI_SERVICE_HOST: 0.0.0.0
      AI_SERVICE_PORT: 8001
    ports:
      - "8001:8001"
    volumes:
      - ./outputs:/app/outputs:ro
