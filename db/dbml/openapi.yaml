openapi: 3.0.2
info:
  title: AI Kids Care API
  version: 2.0.2
servers:
- url: http://localhost:8080/api
tags:
- name: Auth
- name: AiModel
- name: AuditLog
- name: CameraStream
- name: CctvCamera
- name: Child
- name: ChildClassAssignment
- name: ChildGuardianRelationship
- name: ClassEntity
- name: ClassRoomAssignment
- name: ClassTeacherAssignment
- name: DetectionEvent
- name: DetectionSession
- name: DeviceToken
- name: EventEvidence
- name: EventReview
- name: Guardian
- name: Kindergarten
- name: Notification
- name: NotificationRule
- name: Room
- name: RoomCameraAssignment
- name: Superadmin
- name: Teacher
- name: UserAccount
- name: UserKindergartenMembership
- name: UserRoleAssignment
paths:
    /v1/auth/register:
      post:
        tags:
          - Auth
        security: []
        summary: Register user account
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRegisterRequest'
        responses:
          '201':
            description: Created
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/AuthRegisterResponse'
          '400':
            description: Validation error
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '409':
            description: Unique conflict (email/phone/loginId)
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
    /v1/auth/login:
      post:
        tags:
          - Auth
        security: []
        summary: Login
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginRequest'
        responses:
          '200':
            description: OK
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/TokenResponse'
          '401':
            description: Invalid credentials or account not ACTIVE
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
    /v1/auth/refresh:
      post:
        tags:
          - Auth
        security: []
        summary: Refresh access token
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRefreshRequest'
        responses:
          '200':
            description: OK
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/TokenResponse'
          '401':
            description: Invalid refresh token
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
    /v1/auth/logout:
      post:
        tags:
          - Auth
        security: []
        summary: Logout (revoke refresh token)
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLogoutRequest'
        responses:
          '204':
            description: No Content
    /v1/auth/password:
      patch:
        tags:
          - Auth
        security:
          - bearerAuth: []
        summary: Change password (current password required)
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangePasswordRequest'
        responses:
          '204':
            description: No Content
          '400':
            description: Validation error (weak password, missing fields)
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '401':
            description: Unauthorized (not logged in / invalid token)
          '403':
            description: Current password mismatch
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
    /v1/auth/password-resets:
      post:
        tags:
          - Auth
        security: []
        summary: Start forgot password flow
        description: Always returns 200 to prevent account enumeration.
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthPasswordResetRequest'
        responses:
          '200':
            description: OK
            content:
              application/json:
                schema:
                  type: object
                  required:
                    - requestId
                  properties:
                    requestId:
                      type: string
    /v1/auth/password-resets/{resetToken}:
      patch:
        tags:
          - Auth
        security: []
        summary: Reset password with reset token
        parameters:
          - name: resetToken
            in: path
            required: true
            description: Password reset token from email/SMS link
            schema:
              type: string
              minLength: 10
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResetPasswordRequest'
        responses:
          '204':
            description: No Content
          '400':
            description: Invalid token / weak password
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
    /v1/auth/verification-codes:
      post:
        tags:
          - Auth
        security: []
        summary: Send OTP verification code
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationCodeCreateRequest'
        responses:
          '201':
            description: Created
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/VerificationCodeCreateResponse'
          '429':
            description: Rate limited
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
    /v1/auth/verification-codes/{challengeId}/verifications:
      post:
        tags:
          - Auth
        security: []
        summary: Verify OTP code
        parameters:
          - name: challengeId
            in: path
            required: true
            schema:
              type: string
            description: Verification challenge identifier returned by create endpoint
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyVerificationCodeRequest'
        responses:
          '200':
            description: Verified. Returns a short-lived token for the next step.
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/VerifyVerificationCodeResponse'
          '400':
            description: Invalid or expired code (or validation error)
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
          '429':
            description: Too many attempts / rate limited
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/ErrorResponse'
