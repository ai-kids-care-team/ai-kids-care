components:
  schemas:
    AuthRegisterRequest:
      type: object
      required:
        - password
      properties:
        loginId:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        phone:
          type: string
          nullable: true
        password:
          type: string
          format: password
          minLength: 8
        verification:
          type: object
          nullable: true
          description: Optional OTP verification payload (enforce by policy).
          properties:
            channel:
              type: string
              enum:
                - EMAIL
                - SMS
            to:
              type: string
            code:
              type: string
      description: |
        At least one of loginId/email/phone must be provided (enforced by server). email and phone must be unique (DB constraints exist).
    StatusEnum:
      type: string
      enum:
        - ACTIVE
        - PENDING
        - DISABLED
      description: Unified status enum from DBML.
    AuthRegisterResponse:
      type: object
      required:
        - userId
        - status
        - createdAt
      properties:
        userId:
          type: integer
          format: int64
        status:
          $ref: '#/components/schemas/StatusEnum'
        createdAt:
          type: string
          format: date-time
    AuthLoginRequest:
      type: object
      required:
        - identifier
        - password
      properties:
        identifier:
          type: string
          description: login_id or email or phone
        password:
          type: string
          format: password
    TokenResponse:
      type: object
      required:
        - accessToken
        - tokenType
        - expiresIn
        - refreshToken
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
          enum:
            - Bearer
        expiresIn:
          type: integer
          description: seconds
        refreshToken:
          type: string
        refreshExpiresIn:
          type: integer
          description: seconds
          nullable: true
    AuthRefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
    AuthLogoutRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
        allSessions:
          type: boolean
          default: false
    ChangePasswordRequest:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
          format: password
        newPassword:
          type: string
          format: password
          minLength: 8
    AuthPasswordResetRequest:
      type: object
      required:
        - channel
        - to
      properties:
        channel:
          type: string
          enum:
            - EMAIL
            - SMS
        to:
          type: string
    ResetPasswordRequest:
      type: object
      required:
        - newPassword
      properties:
        newPassword:
          type: string
          format: password
          minLength: 8
    VerificationCodeCreateRequest:
      type: object
      required:
        - channel
        - to
        - purpose
      properties:
        channel:
          type: string
          enum:
            - EMAIL
            - SMS
        to:
          type: string
        purpose:
          type: string
          enum:
            - SIGNUP
            - PASSWORD_RESET
            - VERIFY_EMAIL
            - VERIFY_PHONE
            - CHANGE_EMAIL
            - CHANGE_PHONE
            - MFA_LOGIN
    VerificationCodeCreateResponse:
      type: object
      required:
        - challengeId
        - expiresAt
      properties:
        challengeId:
          type: string
        expiresAt:
          type: string
          format: date-time
    VerifyVerificationCodeRequest:
      type: object
      required:
        - code
      properties:
        code:
          type: string
    VerifyVerificationCodeResponse:
      type: object
      required:
        - verificationToken
        - expiresAt
      properties:
        verificationToken:
          type: string
          description: Short-lived token proving the challenge was verified
        expiresAt:
          type: string
          format: date-time
          description: Token expiration time (UTC recommended)
    ErrorResponse:
      type: object
      required:
      - code
      - message
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        traceId:
          type: string
    AiModelResponse:
      type: object
      properties:
        model_id:
          type: integer
          format: int64
          description: AI 모델 ID
        name:
          type: string
          description: 모델 이름
        version:
          type: string
          description: 모델 버전
        status:
          type: string
          enum:
          - ACTIVE
          - PENDING
          - DISABLED
          description: 모델 상태
        created_at:
          type: string
          format: date-time
          description: 생성 일시
        updated_at:
          type: string
          format: date-time
          description: 수정 일시
      required:
      - model_id
    AiModelCreateRequest:
      type: object
      properties:
        name:
          type: string
          description: 모델 이름
        version:
          type: string
          description: 모델 버전
        status:
          type: string
          enum:
          - ACTIVE
          - PENDING
          - DISABLED
          description: 모델 상태
        created_at:
          type: string
