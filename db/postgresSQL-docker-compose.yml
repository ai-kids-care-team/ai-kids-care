version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: ai-kids-postgres
    restart: always

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kids_postgres_db}
      POSTGRES_USER: ${POSTGRES_USER:-kids_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kids_pass}
      TZ: Asia/Seoul
      PGTZ: Asia/Seoul

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kids_user} -d ${POSTGRES_DB:-kids_postgres_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: