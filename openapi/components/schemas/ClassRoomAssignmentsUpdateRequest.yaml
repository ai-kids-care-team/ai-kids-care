type: object
properties:
  kindergarten_id:
    type: integer
    format: int64
    description: 유치원 ID(테넌트/필터링용)
  class_id:
    type: integer
    format: int64
    description: 반 ID
  room_id:
    type: integer
    format: int64
    description: 공간 ID
  start_at:
    type: string
    format: date-time
    description: 사용 시작 일시
  end_at:
    type: string
    format: date-time
    description: 사용 종료 일시, NULL=현재사용중
  purpose:
    type: string
    description: 사용 목적(수업/체육/행사/기타)
  note:
    type: string
    description: 비고/메모
  status:
    type: string
    enum:
      - ACTIVE
      - PENDING
      - DISABLED
    description: 배정 상태
  created_by_user_id:
    type: integer
    format: int64
    description: 생성자 사용자 ID
  created_at:
    type: string
    format: date-time
    description: 생성 일시
  updated_at:
    type: string
    format: date-time
    description: 수정 일시
