type: object
properties:
  notification_id:
    type: integer
    format: int64
    description: 알림 ID
  kindergarten_id:
    type: integer
    format: int64
    description: 유치원 ID(KINDERGARTEN.kindergarten_id)
  event_id:
    type: integer
    format: int64
    description: 관련 이벤트 ID(DETECTION_EVENT.event_id)
  recipient_user_id:
    type: integer
    format: int64
    description: 수신자 사용자 ID(USER_ACCOUNT.user_id)
  channel:
    type: string
    description: 전송 채널(PUSH/SMS/EMAIL)
  title:
    type: string
    description: 알림 제목
  body:
    type: string
    description: 알림 본문
  status:
    type: string
    enum:
      - QUEUED
      - SENDING
      - SENT
      - DELIVERED
      - READ
      - FAILED
      - CANCELED
    description: 전송 상태(세분화)
  dedupe_key:
    type: string
    description: 중복 방지 키(멱등성 키, 애플리케이션에서 생성)
  sent_at:
    type: string
    format: date-time
    description: 전송 완료/시도 일시
  fail_reason:
    type: string
    description: 실패 사유
  retry_count:
    type: integer
    format: int32
    description: 재시도 횟수
  created_at:
    type: string
    format: date-time
    description: 생성 일시
required:
  - notification_id
  - kindergarten_id
  - event_id
  - recipient_user_id
