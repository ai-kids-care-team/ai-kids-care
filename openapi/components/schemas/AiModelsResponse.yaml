type: object
properties:
  model_id:
    type: integer
    format: int64
    description: AI 모델 ID
  name:
    type: string
    description: 모델 이름
  version:
    type: string
    description: 모델 버전
  status:
    type: string
    enum:
      - ACTIVE
      - PENDING
      - DISABLED
    description: 모델 상태
  created_at:
    type: string
    format: date-time
    description: 생성 일시
  updated_at:
    type: string
    format: date-time
    description: 수정 일시
required:
  - model_id
