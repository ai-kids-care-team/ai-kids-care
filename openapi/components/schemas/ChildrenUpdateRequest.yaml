type: object
properties:
  kindergarten_id:
    type: integer
    format: int64
  name:
    type: string
    description: 원아 이름
  child_no:
    type: string
    description: 원아 번호(원내 관리번호)
  rrn_encrypted:
    type: string
    description: 주민등록번호 뒤자리 암호문(암호화 저장)
  rrn_first6:
    type: string
    description: 주민등록번호 앞 6자리(생년월일, 검색/중복확인용)
  birth_date:
    type: string
    format: date
    description: 생년월일
  gender:
    type: string
    description: 성별
  address:
    type: string
    description: 주소
  enroll_date:
    type: string
    format: date
    description: 입원/등록일
  leave_date:
    type: string
    format: date
    description: 퇴원/전원/졸업일
  status:
    type: string
    enum:
      - ACTIVE
      - PENDING
      - DISABLED
    description: 재원 상태
  created_at:
    type: string
    format: date-time
    description: 생성 일시
  updated_at:
    type: string
    format: date-time
    description: 수정 일시
