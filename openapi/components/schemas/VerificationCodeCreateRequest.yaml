type: object
required:
  - channel
  - to
  - purpose
properties:
  channel:
    type: string
    enum:
      - EMAIL
      - SMS
  to:
    type: string
  purpose:
    type: string
    enum:
      - SIGNUP
      - PASSWORD_RESET
      - VERIFY_EMAIL
      - VERIFY_PHONE
      - CHANGE_EMAIL
      - CHANGE_PHONE
      - MFA_LOGIN
