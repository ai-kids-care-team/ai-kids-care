type: object
properties:
  kindergarten_id:
    type: integer
    format: int64
  name:
    type: string
    description: 공간/교실 이름
  room_code:
    type: string
    description: 공간 코드(내부 식별용)
  location_note:
    type: string
    description: 위치 설명(층/동/출입구 등)
  room_type:
    type: string
    description: 공간 유형(교실/복도/현관/놀이터 등)
  status:
    type: string
    enum:
      - ACTIVE
      - PENDING
      - DISABLED
    description: 운영 상태
  created_at:
    type: string
    format: date-time
    description: 생성 일시
  updated_at:
    type: string
    format: date-time
    description: 수정 일시
