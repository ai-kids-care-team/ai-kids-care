type: object
properties:
  user_id:
    type: integer
    format: int64
    description: 대상 사용자 ID(USER_ACCOUNT.user_id)
  role:
    type: string
    enum:
      - GUARDIAN
      - TEACHER
      - KINDERGARTEN_ADMIN
      - PLATFORM_IT_ADMIN
      - SUPERADMIN
    description: 역할(GUARDIAN/TEACHER/KINDERGARTEN_ADMIN/PLATFORM_IT_ADMIN/SUPERADMIN)
  scope_type:
    type: string
    enum:
      - PLATFORM
      - KINDERGARTEN
    description: 권한 범위 유형(PLATFORM/KINDERGARTEN)
  scope_id:
    type: integer
    format: int64
    description: 권한 범위 ID(NULL=PLATFORM; KINDERGARTEN일 때 kindergarten_id)
  status:
    type: string
    enum:
      - ACTIVE
      - PENDING
      - DISABLED
    description: 권한 상태
  granted_at:
    type: string
    format: date-time
    description: 권한 부여 일시
  granted_by_user_id:
    type: integer
    format: int64
    description: 권한 부여자 사용자 ID(USER_ACCOUNT.user_id)
  revoked_at:
    type: string
    format: date-time
    description: 권한 회수 일시
required:
  - user_id
