type: object
properties:
  kindergarten_id:
    type: integer
    format: int64
    description: 유치원 ID(KINDERGARTEN.kindergarten_id)
  serial_no:
    type: string
    description: 카메라 시리얼 번호/제조사 식별자
  camera_name:
    type: string
    description: 카메라 이름/별칭 또는 표시 이름
  model:
    type: string
    description: 모델명
  created_by_user_id:
    type: integer
    format: int64
    description: 등록한 사용자 ID
  status:
    type: string
    enum:
      - ACTIVE
      - PENDING
      - DISABLED
    description: 운영 상태
  last_seen_at:
    type: string
    format: date-time
    description: 마지막 접속/하트비트 일시
  created_at:
    type: string
    format: date-time
    description: 생성 일시
  updated_at:
    type: string
    format: date-time
    description: 수정 일시
required:
  - kindergarten_id
