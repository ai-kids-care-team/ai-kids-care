type: object
properties:
  event_id:
    type: integer
    format: int64
    description: 탐지 이벤트 ID
  kindergarten_id:
    type: integer
    format: int64
    description: 유치원 ID(KINDERGARTEN.kindergarten_id)
  camera_id:
    type: integer
    format: int64
    description: 카메라 ID(CCTV_CAMERA.camera_id)
  room_id:
    type: integer
    format: int64
    description: 룸/구역 ID(ROOM 테이블 FK 가정)
  session_id:
    type: integer
    format: int64
    description: 탐지 세션 ID(DETECTION_SESSION.session_id)
  event_type:
    type: string
    description: 이벤트 유형(탐지 카테고리/코드)
  severity:
    type: integer
    format: int32
    description: 심각도(정수 등급)
  confidence:
    type: number
    format: double
    description: 신뢰도(0~1)
  detected_at:
    type: string
    format: date-time
    description: 탐지 발생 일시
  start_time:
    type: string
    format: date-time
    description: 이벤트 시작 시각
  end_time:
    type: string
    format: date-time
    description: 이벤트 종료 시각
  status:
    type: string
    enum:
      - OPEN
      - ACKNOWLEDGED
      - IN_REVIEW
      - RESOLVED
      - DISMISSED
      - ESCALATED
    description: 이벤트 상태(세분화)
  created_at:
    type: string
    format: date-time
    description: 생성 일시
  updated_at:
    type: string
    format: date-time
    description: 수정 일시
required:
  - event_id
  - kindergarten_id
  - camera_id
  - room_id
  - session_id
