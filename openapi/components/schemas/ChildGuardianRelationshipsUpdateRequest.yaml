type: object
properties:
  relationship:
    type: string
    description: 관계(부/모/조부모/후견인 등)
  is_primary:
    type: boolean
    description: 주 보호자 여부
  priority:
    type: integer
    format: int32
    description: 우선순위(연락/권한 순서)
  start_date:
    type: string
    format: date
    description: 관계 시작일
  end_date:
    type: string
    format: date
    description: 관계 종료일
  created_at:
    type: string
    format: date-time
    description: 생성 일시
  updated_at:
    type: string
    format: date-time
    description: 수정 일시
