type: object
properties:
  user_id:
    type: integer
    format: int64
    description: 사용자 ID(USER_ACCOUNT.user_id)
  platform:
    type: string
    description: 플랫폼(IOS/ANDROID)
  push_token:
    type: string
    description: 푸시 토큰(APNs/FCM 등)
  status:
    type: string
    enum:
      - ACTIVE
      - PENDING
      - DISABLED
    description: 토큰 상태
  last_seen_at:
    type: string
    format: date-time
    description: 마지막 사용/갱신 일시
  created_at:
    type: string
    format: date-time
    description: 생성 일시
required:
  - user_id
