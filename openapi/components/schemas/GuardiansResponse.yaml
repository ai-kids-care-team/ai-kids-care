type: object
properties:
  guardian_id:
    type: integer
    format: int64
  kindergarten_id:
    type: integer
    format: int64
  user_id:
    type: integer
    format: int64
  name:
    type: string
    description: 보호자 이름
  rrn_encrypted:
    type: string
    description: 주민등록번호 암호문(암호화 저장)
  rrn_first6:
    type: string
    description: 주민등록번호 앞 6자리(생년월일, 검색/중복확인용)
  gender:
    type: string
    description: 성별
  address:
    type: string
    description: 주소
  status:
    type: string
    enum:
      - ACTIVE
      - PENDING
      - DISABLED
    description: 보호자 상태
  created_at:
    type: string
    format: date-time
    description: 생성 일시
  updated_at:
    type: string
    format: date-time
    description: 수정 일시
required:
  - guardian_id
  - kindergarten_id
  - user_id
