type: object
properties:
  kindergarten_id:
    type: integer
    format: int64
    description: 유치원 ID
  name:
    type: string
    description: 유치원명
  address:
    type: string
    description: 주소
  region_code:
    type: string
    description: 지역 코드(행정구역/내부 코드)
  code:
    type: string
    description: 유치원 코드(내부/기관 식별용)
  business_registration_no:
    type: string
    description: 사업자관리번호(유치원의 고유 사업자 등록 번호)
  contact_name:
    type: string
    description: 담당자 이름
  contact_phone:
    type: string
    description: 담당자 전화번호
  contact_email:
    type: string
    description: 담당자 이메일
  status:
    type: string
    enum:
      - ACTIVE
      - PENDING
      - DISABLED
    description: 운영 상태
  created_at:
    type: string
    format: date-time
    description: 생성 일시
  updated_at:
    type: string
    format: date-time
    description: 수정 일시
required:
  - kindergarten_id
