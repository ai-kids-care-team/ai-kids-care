type: object
properties:
  class_id:
    type: integer
    format: int64
  kindergarten_id:
    type: integer
    format: int64
  name:
    type: string
    description: 반/학급 이름
  grade:
    type: string
    description: '학년/연령대(예: 만3/만4/만5)'
  academic_year:
    type: integer
    format: int64
    description: '학년도(예: 2026)'
  start_date:
    type: string
    format: date
    description: 운영 시작일
  end_date:
    type: string
    format: date
    description: 운영 종료일
  status:
    type: string
    enum:
      - ACTIVE
      - PENDING
      - DISABLED
    description: 운영 상태
  created_at:
    type: string
    format: date-time
    description: 생성 일시
  updated_at:
    type: string
    format: date-time
    description: 수정 일시
required:
  - class_id
  - kindergarten_id
