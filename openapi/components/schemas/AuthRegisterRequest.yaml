type: object
required:
  - password
properties:
  loginId:
    type: string
    nullable: true
  email:
    type: string
    format: email
    nullable: true
  phone:
    type: string
    nullable: true
  password:
    type: string
    format: password
    minLength: 8
  verification:
    type: object
    nullable: true
    description: Optional OTP verification payload (enforce by policy).
    properties:
      channel:
        type: string
        enum:
          - EMAIL
          - SMS
      to:
        type: string
      code:
        type: string
description: >
  At least one of loginId/email/phone must be provided (enforced by server).
  email and phone must be unique (DB constraints exist).
