type: object
properties:
  user_id:
    type: integer
    format: int64
    description: 사용자 ID(USER_ACCOUNT.user_id)
  kindergarten_id:
    type: integer
    format: int64
    description: 유치원 ID(KINDERGARTEN.kindergarten_id)
  status:
    type: string
    enum:
      - ACTIVE
      - PENDING
      - DISABLED
    description: 멤버십 상태
  joined_at:
    type: string
    format: date-time
    description: 가입/승인 일시
  left_at:
    type: string
    format: date-time
    description: 탈퇴/종료 일시
  created_at:
    type: string
    format: date-time
    description: 생성 일시
  updated_at:
    type: string
    format: date-time
    description: 수정 일시
required:
  - user_id
  - kindergarten_id
