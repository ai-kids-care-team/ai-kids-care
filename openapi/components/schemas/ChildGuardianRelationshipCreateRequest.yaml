type: object
required:
  - childId
  - guardianId
properties:
  childId:
    type: integer
    format: int64
  guardianId:
    type: integer
    format: int64
  relationship:
    type: string
    nullable: true
  isPrimary:
    type: boolean
    nullable: true
  priority:
    type: integer
    nullable: true
  startDate:
    type: string
    format: date
    nullable: true
  endDate:
    type: string
    format: date
    nullable: true
