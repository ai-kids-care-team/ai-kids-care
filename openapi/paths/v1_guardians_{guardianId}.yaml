get:
  tags:
    - Guardians
  security:
    - bearerAuth: []
  summary: Get guardian
  parameters:
    - $ref: ../components/parameters/GuardianIdPath.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Guardian.yaml
    '404':
      description: Not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
patch:
  tags:
    - Guardians
  security:
    - bearerAuth: []
  summary: Update guardian
  parameters:
    - $ref: ../components/parameters/GuardianIdPath.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/UpdateGuardianRequest.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Guardian.yaml
    '400':
      description: Validation error
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '404':
      description: Not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
delete:
  tags:
    - Guardians
  security:
    - bearerAuth: []
  summary: Delete guardian
  description: >
    Prefer soft disable via PATCH status=DISABLED. Delete only for admin
    corrections.
  parameters:
    - $ref: ../components/parameters/GuardianIdPath.yaml
  responses:
    '204':
      description: No Content
