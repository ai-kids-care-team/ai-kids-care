get:
  tags:
    - CameraStreams
  operationId: listCameraStreams
  summary: List camera_streams
  parameters:
    - name: page
      in: query
      schema:
        type: integer
        format: int32
        minimum: 0
    - name: size
      in: query
      schema:
        type: integer
        format: int32
        minimum: 1
    - name: sort
      in: query
      schema:
        type: string
      description: e.g. created_at,desc
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/CameraStreamsResponsePage.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '500':
      $ref: ../components/responses/InternalError.yaml
post:
  tags:
    - CameraStreams
  operationId: createCameraStreams
  summary: Create camera_streams
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CameraStreamsCreateRequest.yaml
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: ../components/schemas/CameraStreamsResponse.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '409':
      $ref: ../components/responses/Conflict.yaml
    '500':
      $ref: ../components/responses/InternalError.yaml
