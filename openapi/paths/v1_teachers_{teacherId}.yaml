get:
  tags:
    - Teachers
  security:
    - bearerAuth: []
  summary: Get teacher
  parameters:
    - $ref: ../components/parameters/KindergartenIdPath.yaml
    - $ref: ../components/parameters/TeacherIdPath.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Teacher.yaml
    '404':
      description: Not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
patch:
  tags:
    - Teachers
  security:
    - bearerAuth: []
  summary: Update teacher
  description: >
    Typical use: status change, profile edits. Server enforces who can edit
    sensitive fields.
  parameters:
    - $ref: ../components/parameters/KindergartenIdPath.yaml
    - $ref: ../components/parameters/TeacherIdPath.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/UpdateTeacherRequest.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Teacher.yaml
    '400':
      description: Validation error
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '404':
      description: Not found
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
delete:
  tags:
    - Teachers
  security:
    - bearerAuth: []
  summary: Delete teacher
  description: >
    Prefer soft disable via PATCH status=DISABLED. Delete only for admin
    corrections.
  parameters:
    - $ref: ../components/parameters/KindergartenIdPath.yaml
    - $ref: ../components/parameters/TeacherIdPath.yaml
  responses:
    '204':
      description: No Content
