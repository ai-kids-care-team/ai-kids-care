post:
  tags:
    - Auth
  security: []
  summary: Register user account
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/AuthRegisterRequest.yaml
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: ../components/schemas/AuthRegisterResponse.yaml
    '400':
      description: Validation error
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '409':
      description: Unique conflict (email/phone/loginId)
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
