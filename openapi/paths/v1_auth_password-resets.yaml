post:
  tags:
    - Auth
  security: []
  summary: Start forgot password flow
  description: Always returns 200 to prevent account enumeration.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/AuthPasswordResetRequest.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            required:
              - requestId
            properties:
              requestId:
                type: string
