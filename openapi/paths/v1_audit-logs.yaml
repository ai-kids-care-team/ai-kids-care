get:
  tags:
    - Audit
  security:
    - bearerAuth: []
  summary: List audit logs
  parameters:
    - $ref: ../components/parameters/LimitQuery.yaml
    - $ref: ../components/parameters/OffsetQuery.yaml
    - name: userId
      in: query
      required: false
      schema:
        type: integer
        format: int64
    - name: action
      in: query
      required: false
      schema:
        type: string
    - name: resourceType
      in: query
      required: false
      schema:
        type: string
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            required:
              - items
              - meta
            properties:
              items:
                type: array
                items:
                  $ref: ../components/schemas/AuditLog.yaml
              meta:
                $ref: ../components/schemas/PaginationMeta.yaml
