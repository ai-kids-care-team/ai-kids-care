get:
  tags:
    - ChildGuardianRelationships
  operationId: listChildGuardianRelationships
  summary: List child_guardian_relationships
  parameters:
    - name: page
      in: query
      schema:
        type: integer
        format: int32
        minimum: 0
    - name: size
      in: query
      schema:
        type: integer
        format: int32
        minimum: 1
    - name: sort
      in: query
      schema:
        type: string
      description: e.g. created_at,desc
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ChildGuardianRelationshipsResponsePage.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '500':
      $ref: ../components/responses/InternalError.yaml
post:
  tags:
    - ChildGuardianRelationships
  operationId: createChildGuardianRelationships
  summary: Create child_guardian_relationships
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ChildGuardianRelationshipsCreateRequest.yaml
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ChildGuardianRelationshipsResponse.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '409':
      $ref: ../components/responses/Conflict.yaml
    '500':
      $ref: ../components/responses/InternalError.yaml
