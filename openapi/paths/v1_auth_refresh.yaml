post:
  tags:
    - Auth
  security: []
  summary: Refresh access token
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/AuthRefreshRequest.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/TokenResponse.yaml
    '401':
      description: Invalid refresh token
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
