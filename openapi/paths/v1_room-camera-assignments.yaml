get:
  tags:
    - Rooms
    - Cameras
  security:
    - bearerAuth: []
  summary: List room-camera assignments
  parameters:
    - $ref: ../components/parameters/LimitQuery.yaml
    - $ref: ../components/parameters/OffsetQuery.yaml
    - name: roomId
      in: query
      required: false
      schema:
        type: integer
        format: int64
    - name: cameraId
      in: query
      required: false
      schema:
        type: integer
        format: int64
    - name: activeAt
      in: query
      required: false
      schema:
        type: string
        format: date-time
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            required:
              - items
              - meta
            properties:
              items:
                type: array
                items:
                  $ref: ../components/schemas/RoomCameraAssignment.yaml
              meta:
                $ref: ../components/schemas/PaginationMeta.yaml
post:
  tags:
    - Rooms
    - Cameras
  security:
    - bearerAuth: []
  summary: Create room-camera assignment (install/move camera)
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/RoomCameraAssignmentCreateRequest.yaml
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: ../components/schemas/RoomCameraAssignment.yaml
    '409':
      description: Conflict (overlap)
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
patch:
  tags:
    - Rooms
    - Cameras
  security:
    - bearerAuth: []
  summary: Update room-camera assignment (end/close)
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/UpdateRoomCameraAssignmentRequest.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/RoomCameraAssignment.yaml
delete:
  tags:
    - Rooms
    - Cameras
  security:
    - bearerAuth: []
  summary: Delete room-camera assignment
  responses:
    '204':
      description: No Content
