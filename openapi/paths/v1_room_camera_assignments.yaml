get:
  tags:
    - RoomCameraAssignments
  operationId: listRoomCameraAssignments
  summary: List room_camera_assignments
  parameters:
    - name: page
      in: query
      schema:
        type: integer
        format: int32
        minimum: 0
    - name: size
      in: query
      schema:
        type: integer
        format: int32
        minimum: 1
    - name: sort
      in: query
      schema:
        type: string
      description: e.g. created_at,desc
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/RoomCameraAssignmentsResponsePage.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '500':
      $ref: ../components/responses/InternalError.yaml
post:
  tags:
    - RoomCameraAssignments
  operationId: createRoomCameraAssignments
  summary: Create room_camera_assignments
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/RoomCameraAssignmentsCreateRequest.yaml
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: ../components/schemas/RoomCameraAssignmentsResponse.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '409':
      $ref: ../components/responses/Conflict.yaml
    '500':
      $ref: ../components/responses/InternalError.yaml
