get:
  tags:
    - Detections
  security:
    - bearerAuth: []
  summary: List detection events
  parameters:
    - $ref: ../components/parameters/LimitQuery.yaml
    - $ref: ../components/parameters/OffsetQuery.yaml
    - name: status
      in: query
      required: false
      schema:
        $ref: ../components/schemas/StatusEnum.yaml
    - name: cameraId
      in: query
      required: false
      schema:
        type: integer
        format: int64
    - name: roomId
      in: query
      required: false
      schema:
        type: integer
        format: int64
    - name: eventType
      in: query
      required: false
      schema:
        type: string
    - name: detectedFrom
      in: query
      required: false
      schema:
        type: string
        format: date-time
    - name: detectedTo
      in: query
      required: false
      schema:
        type: string
        format: date-time
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            required:
              - items
              - meta
            properties:
              items:
                type: array
                items:
                  $ref: ../components/schemas/DetectionEvent.yaml
              meta:
                $ref: ../components/schemas/PaginationMeta.yaml
