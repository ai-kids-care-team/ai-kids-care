get:
  tags:
    - NotificationRules
  operationId: listNotificationRules
  summary: List notification_rules
  parameters:
    - name: page
      in: query
      schema:
        type: integer
        format: int32
        minimum: 0
    - name: size
      in: query
      schema:
        type: integer
        format: int32
        minimum: 1
    - name: sort
      in: query
      schema:
        type: string
      description: e.g. created_at,desc
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/NotificationRulesResponsePage.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '500':
      $ref: ../components/responses/InternalError.yaml
post:
  tags:
    - NotificationRules
  operationId: createNotificationRules
  summary: Create notification_rules
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/NotificationRulesCreateRequest.yaml
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: ../components/schemas/NotificationRulesResponse.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '409':
      $ref: ../components/responses/Conflict.yaml
    '500':
      $ref: ../components/responses/InternalError.yaml
