    - RoomCameraAssignments
  operationId: getRoomCameraAssignments
  summary: Get room_camera_assignments by id
  parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/RoomCameraAssignmentsResponse.yaml
    '404':
