patch:
  tags:
    - Auth
  security: []
  summary: Reset password with reset token
  parameters:
    - name: resetToken
      in: path
      required: true
      description: Password reset token from email/SMS link
      schema:
        type: string
        minLength: 10
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ResetPasswordRequest.yaml
  responses:
    '204':
      description: No Content
    '400':
      description: Invalid token / weak password
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
