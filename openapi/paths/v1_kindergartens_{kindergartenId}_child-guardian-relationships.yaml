get:
  tags:
    - Children
    - Guardians
  security:
    - bearerAuth: []
  summary: List child-guardian relationships
  parameters:
    - $ref: ../components/parameters/KindergartenIdPath.yaml
    - $ref: ../components/parameters/LimitQuery.yaml
    - $ref: ../components/parameters/OffsetQuery.yaml
    - name: childId
      in: query
      required: false
      schema:
        type: integer
        format: int64
    - name: guardianId
      in: query
      required: false
      schema:
        type: integer
        format: int64
    - name: activeAt
      in: query
      required: false
      schema:
        type: string
        format: date
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            required:
              - items
              - meta
            properties:
              items:
                type: array
                items:
                  $ref: ../components/schemas/ChildGuardianRelationship.yaml
              meta:
                $ref: ../components/schemas/PaginationMeta.yaml
post:
  tags:
    - Children
    - Guardians
  security:
    - bearerAuth: []
  summary: Create child-guardian relationship
  parameters:
    - $ref: ../components/parameters/KindergartenIdPath.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ChildGuardianRelationshipCreateRequest.yaml
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ChildGuardianRelationship.yaml
    '409':
      description: Relationship already exists (composite PK)
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
