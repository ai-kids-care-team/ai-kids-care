patch:
  tags:
    - Auth
  security:
    - bearerAuth: []
  summary: Change password (current password required)
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ChangePasswordRequest.yaml
  responses:
    '204':
      description: No Content
    '400':
      description: Validation error (weak password, missing fields)
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '401':
      description: Unauthorized (not logged in / invalid token)
    '403':
      description: Current password mismatch
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
