get:
  tags:
    - Classes
    - Teachers
  security:
    - bearerAuth: []
  summary: List class-teacher assignments
  parameters:
    - $ref: ../components/parameters/LimitQuery.yaml
    - $ref: ../components/parameters/OffsetQuery.yaml
    - name: classId
      in: query
      required: false
      schema:
        type: integer
        format: int64
    - name: teacherId
      in: query
      required: false
      schema:
        type: integer
        format: int64
    - name: status
      in: query
      required: false
      schema:
        $ref: ../components/schemas/StatusEnum.yaml
    - name: activeAt
      in: query
      required: false
      schema:
        type: string
        format: date
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            required:
              - items
              - meta
            properties:
              items:
                type: array
                items:
                  $ref: ../components/schemas/ClassTeacherAssignment.yaml
              meta:
                $ref: ../components/schemas/PaginationMeta.yaml
post:
  tags:
    - Classes
    - Teachers
  security:
    - bearerAuth: []
  summary: Create class-teacher assignment
  parameters: null
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ClassTeacherAssignmentCreateRequest.yaml
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ClassTeacherAssignment.yaml
    '409':
      description: Conflict (overlap)
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
patch:
  tags:
    - Classes
    - Teachers
  security:
    - bearerAuth: []
  summary: Update class-teacher assignment (end/close or edit role)
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/UpdateClassTeacherAssignmentRequest.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ClassTeacherAssignment.yaml
delete:
  tags:
    - Classes
    - Teachers
  security:
    - bearerAuth: []
  summary: Delete class-teacher assignment
  responses:
    '204':
      description: No Content
