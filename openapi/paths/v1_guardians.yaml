get:
  tags:
    - Guardians
  security:
    - bearerAuth: []
  summary: List guardians
  parameters:
    - $ref: ../components/parameters/KindergartenIdPath.yaml
    - $ref: ../components/parameters/LimitQuery.yaml
    - $ref: ../components/parameters/OffsetQuery.yaml
    - name: status
      in: query
      required: false
      schema:
        $ref: ../components/schemas/StatusEnum.yaml
    - name: userId
      in: query
      required: false
      schema:
        type: integer
        format: int64
    - name: name
      in: query
      required: false
      schema:
        type: string
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: object
            required:
              - items
              - meta
            properties:
              items:
                type: array
                items:
                  $ref: ../components/schemas/Guardian.yaml
              meta:
                $ref: ../components/schemas/PaginationMeta.yaml
post:
  tags:
    - Guardians
  security:
    - bearerAuth: []
  summary: Create guardian
  parameters:
    - $ref: ../components/parameters/KindergartenIdPath.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/GuardianCreateRequest.yaml
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Guardian.yaml
    '400':
      description: Validation error
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '409':
      description: Conflict (e.g., user already mapped as guardian in this kindergarten)
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
