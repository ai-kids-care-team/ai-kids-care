get:
  tags:
    - EventEvidenceFiles
  operationId: listEventEvidenceFiles
  summary: List event_evidence_files
  parameters:
    - name: page
      in: query
      schema:
        type: integer
        format: int32
        minimum: 0
    - name: size
      in: query
      schema:
        type: integer
        format: int32
        minimum: 1
    - name: sort
      in: query
      schema:
        type: string
      description: e.g. created_at,desc
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            $ref: ../components/schemas/EventEvidenceFilesResponsePage.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '500':
      $ref: ../components/responses/InternalError.yaml
post:
  tags:
    - EventEvidenceFiles
  operationId: createEventEvidenceFiles
  summary: Create event_evidence_files
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/EventEvidenceFilesCreateRequest.yaml
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: ../components/schemas/EventEvidenceFilesResponse.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '409':
      $ref: ../components/responses/Conflict.yaml
    '500':
      $ref: ../components/responses/InternalError.yaml
