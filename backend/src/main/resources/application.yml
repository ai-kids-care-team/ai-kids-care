spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:kids_postgres_db}
    username: ${DB_USER:kids_user}
    password: ${DB_PASSWORD:kids_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

server:
  port: 8080
  tomcat:
    # Tomcat APR(네이티브 라이브러리) 미설치 환경에서
    # AprLifecycleListener가 예외를 던져 서버가 바로 종료되는 문제 방지
    use-apr: never

jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTTokenGenerationThatIsAtLeast256BitsLong}
  expiration: 86400000

logging:
  level:
    root: DEBUG
    sun.rmi: INFO
    javax.management.remote.rmi: INFO
    sun.rmi.transport.tcp: INFO
    sun.rmi.loader: INFO